{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="page-title">Dataset Module</h2>
    <form class="d-flex gap-2" method="post" action="{{ url_for('datasets.upload_csv') }}" enctype="multipart/form-data">
        <input class="form-control form-control-sm" type="file" name="csv_file" accept=".csv" required>
        <button class="btn btn-sm btn-primary"><i class="bi bi-upload"></i> Upload CSV</button>
    </form>
</div>
<div class="panel mb-3">
    <h5>{{ "Edit Record" if record else "Add Record" }}</h5>
    <form class="row g-2" method="post" action="{{ url_for('datasets.update_record', record_id=record.id) if record else url_for('datasets.create_record') }}">
        <div class="col-md-2"><input class="form-control" type="date" name="date" value="{{ record.date if record else '' }}" required></div>
        <div class="col-md-2"><input class="form-control" type="time" name="time" value="{{ record.time if record else '' }}" required></div>
        <div class="col-md-3"><input class="form-control" name="location" placeholder="Location" value="{{ record.location if record else '' }}" required></div>
        <div class="col-md-2"><input class="form-control" type="number" step="0.0000001" name="lat" placeholder="Lat" value="{{ record.lat if record else '' }}" required></div>
        <div class="col-md-2"><input class="form-control" type="number" step="0.0000001" name="lng" placeholder="Lng" value="{{ record.lng if record else '' }}" required></div>
        <div class="col-md-2"><input class="form-control" name="weather" placeholder="Weather" value="{{ record.weather if record else '' }}" required></div>
        <div class="col-md-2"><input class="form-control" type="number" step="0.1" name="traffic_density" placeholder="Density" value="{{ record.traffic_density if record else '' }}" required></div>
        <div class="col-md-2"><input class="form-control" type="number" name="vehicle_count" placeholder="Vehicles" value="{{ record.vehicle_count if record else '' }}" required></div>
        <div class="col-md-2"><input class="form-control" type="number" step="0.1" name="speed" placeholder="Speed" value="{{ record.speed if record else '' }}" required></div>
        <div class="col-md-2"><input class="form-control" name="road_condition" placeholder="Road" value="{{ record.road_condition if record else '' }}" required></div>
        <div class="col-md-2">
            <select class="form-select" name="accident" required>
                {% for risk in ["Low Risk","Medium Risk","High Risk"] %}
                <option value="{{ risk }}" {% if record and record.accident == risk %}selected{% endif %}>{{ risk }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-1"><button class="btn btn-success w-100">{{ "Save" if record else "Add" }}</button></div>
    </form>
</div>
<div class="panel table-responsive">
    <table class="table table-hover align-middle">
        <thead><tr>{% for col in columns %}<th>{{ col }}</th>{% endfor %}<th>Actions</th></tr></thead>
        <tbody>
        {% for row in records %}
        <tr>
            {% for col in columns %}<td>{{ row[col] }}</td>{% endfor %}
            <td class="text-nowrap">
                <a class="btn btn-sm btn-outline-primary" href="{{ url_for('datasets.edit_record', record_id=row.id) }}"><i class="bi bi-pencil"></i></a>
                <form class="d-inline" method="post" action="{{ url_for('datasets.delete_record', record_id=row.id) }}" onsubmit="return confirm('Delete this record?')">
                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
